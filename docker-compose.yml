services:
  crm:
    build:
      context: .
      dockerfile: examples/crm/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://framekit:framekit@postgres:5432/framekit
      REDIS_URL: redis://redis:6379
      FRAMEKIT_AUTH_SECRET: replace-with-at-least-16-characters
      FRAMEKIT_ADMIN_EMAIL: admin@example.com
      FRAMEKIT_ADMIN_PASSWORD: admin12345
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: framekit
      POSTGRES_PASSWORD: framekit
      POSTGRES_DB: framekit
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U framekit -d framekit"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
